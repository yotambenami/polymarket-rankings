<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bg)"/>
  <!-- Bar chart bars (white) -->
  <rect x="9"  y="42" width="8" height="12" rx="1.5" fill="white"/>
  <rect x="20" y="34" width="8" height="20" rx="1.5" fill="white"/>
  <rect x="31" y="24" width="8" height="30" rx="1.5" fill="white"/>
  <rect x="42" y="14" width="8" height="40" rx="1.5" fill="white" opacity="0.95"/>
  <!-- Upward trend line -->
  <polyline points="13,41 24,33 35,23 46,13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
</svg>
